unbind x
bind-key x kill-pane

set -g mouse on
set -g history-limit 10000

set -g extended-keys on
set -g extended-keys-format csi-u

# clipboard passthrough
set -g set-clipboard on
set -g allow-passthrough on

# Keep GUI/SSH environment current in long-lived tmux servers so Neovim can
# find the right clipboard provider after attaching from a new terminal.
set -g update-environment "DISPLAY KRB5CCNAME MSYSTEM SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WAYLAND_DISPLAY WINDOWID XAUTHORITY XDG_SESSION_TYPE"

# Enable vim keybindings for copy mode
set -g mode-keys vi

# Bind 'v' to start selection in copy mode (like entering visual mode)
bind-key -T copy-mode-vi v send -X begin-selection

# Bind 'y' to copy the selected text and exit copy mode
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# Start session numbers from 1 instead of 0
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Split panes with more intuitive keys
bind-key | split-window -h
bind-key - split-window -v

# Status bar
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue
